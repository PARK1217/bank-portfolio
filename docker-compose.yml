services:
  postgres:
    # pgvector 확장이 사전 빌드된 공식 이미지 (Debian bookworm + pg16).
    # 가이드 §3.7 RAG 의 벡터 유사도 검색은 pgvector `vector(768)` + `<=>` 코사인 거리에 의존.
    image: pgvector/pgvector:pg16
    container_name: bank-portfolio-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: bank
      POSTGRES_PASSWORD: bank1234
      POSTGRES_DB: bank
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
      TZ: Asia/Seoul
      PGTZ: Asia/Seoul
    # Postgres 세션 timezone 도 KST 로 고정 — CURRENT_TIMESTAMP / NOW() 모두 KST 로 반환.
    command: ["postgres", "-c", "timezone=Asia/Seoul"]
    ports:
      - "5434:5432"  # 기존 banking 스택(5433)과 동시 실행 가능하도록 분리
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/01_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./db/02_seed.sql:/docker-entrypoint-initdb.d/02_seed.sql:ro
      # 시드 999999 (회귀 자격증명) PARTY 보강 — 02_seed 후순위 적재로 PARTY/INDIVIDUAL_PARTY/CUSTOMER UPDATE.
      # 다른 db/0[3-9]*.sql, db/1[013]*.sql 은 외부 적용(`docker exec -i postgres psql ...`) 또는
      # 마이그레이션 수동 워크플로우로 처리 — fresh init 자동 마운트 대상은 회귀 베이스라인 + 시연 필수 시드.
      - ./db/12_seed_999999_party.sql:/docker-entrypoint-initdb.d/12_seed_999999_party.sql:ro
      # 시연용 HUMAN_REVIEW 큐 2건 (가이드 §9.2.6 사람+AI 협업 어필) — fresh init 자동 적용.
      - ./db/14_human_review_seed.sql:/docker-entrypoint-initdb.d/14_human_review_seed.sql:ro
      # 로그인 5회 실패 잠금 정책 — CUSTOMER.LOGIN_FAIL_COUNT 컬럼 추가. fresh init 자동 적용.
      - ./db/16_login_fail_count.sql:/docker-entrypoint-initdb.d/16_login_fail_count.sql:ro
      # ATTACHED_DOC 원본 파일 메타 컬럼 (FILE_NAME / MIME_TYPE / FILE_SIZE) — fresh init 자동 적용.
      - ./db/20_attached_doc_filemeta.sql:/docker-entrypoint-initdb.d/20_attached_doc_filemeta.sql:ro
      # AI_FAQ.AUDIENCE_CD — RBAC 챗봇 (USER/ADMIN/BOTH 분기) — fresh init 자동 적용.
      - ./db/21_ai_faq_audience.sql:/docker-entrypoint-initdb.d/21_ai_faq_audience.sql:ro
      # AI_CHATBOT_SESSION FK 완화 — admin 챗봇 pseudo_customer_no(990000+) 지원.
      - ./db/22_ai_chatbot_admin_session.sql:/docker-entrypoint-initdb.d/22_ai_chatbot_admin_session.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bank -d bank"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bank-portfolio-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://bank:bank1234@postgres:5432/bank
      JWT_SECRET: dev-secret-change-in-production-please-12345
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_MINUTES: 30
      CORS_ORIGINS: http://localhost:3001,http://localhost:5001
      # 컨테이너 wall-clock 을 KST 로 고정 → datetime.now() / NOW() / 로그 timestamp 모두 KST.
      # JWT 의 iat/exp 는 명시적으로 datetime.now(timezone.utc) 를 쓰므로 표준대로 UTC 유지.
      TZ: Asia/Seoul
      # LLM API (host `.env` 에서 보간, gitignore). 미설정 시 fallback 응답.
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
      HUGGINGFACE_API_KEY: ${HUGGINGFACE_API_KEY:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-groq}
      # Phoenix OTLP — 가이드 §9.2.2 LLM/Agent 관측. phoenix 서비스 미가동 시 export 실패는 graceful degrade.
      PHOENIX_COLLECTOR_ENDPOINT: ${PHOENIX_COLLECTOR_ENDPOINT:-http://phoenix:6006}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://phoenix:6006/v1/traces}
      PHOENIX_PROJECT_NAME: ${PHOENIX_PROJECT_NAME:-banking-rag}
    ports:
      - "8001:8000"  # 기존 banking 스택(8000)과 분리
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app  # 핫리로드용
      - ./data:/app/data        # RAG 코퍼스(read-only 의도) + 첨부 업로드 쓰기(/app/data/files/loan/...)

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bank-portfolio-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8001
      TZ: Asia/Seoul
    ports:
      - "3001:3000"  # 기존 banking 스택(3000)과 분리
    depends_on:
      - backend
    volumes:
      # 핫리로드용 — Dockerfile COPY 된 소스를 호스트로 덮어쓰기. node_modules·.next 는
      # 익명 볼륨으로 컨테이너 빌드본 보호 (호스트 windows node_modules 와 분리).
      - ./frontend/app:/app/app
      - ./frontend/components:/app/components
      - ./frontend/lib:/app/lib
      - /app/node_modules
      - /app/.next

  phoenix:
    # Arize Phoenix — 가이드 §9.2.2 LLM/Agent 관측. RAG 트레이스 + Faithfulness 평가 + 토큰 사용량.
    # OTLP HTTP/UI 통합 포트 6006 — backend 가 `PHOENIX_COLLECTOR_ENDPOINT` 로 발행, 운영자는 같은 포트로 UI 접근.
    image: arizephoenix/phoenix:latest
    container_name: bank-portfolio-phoenix
    restart: unless-stopped
    environment:
      PHOENIX_WORKING_DIR: /mnt/data
      TZ: Asia/Seoul
    ports:
      - "6006:6006"  # UI + OTLP HTTP 통합
    volumes:
      - phoenix_data:/mnt/data

  kafka:
    # 공식 Apache Kafka 3.7 (KRaft 모드 — Zookeeper 없이 단독 운영, 가이드 §2.4).
    # ※ Bitnami 이미지(`bitnami/kafka:3.7`)는 정책 변경으로 무료 태그 제공 안 함 → 공식 이미지로 전환.
    # 토픽: transfer.settlement.{requested,completed} / chatbot.{llm.calls,rag.evaluations}
    image: apache/kafka:3.7.0
    container_name: bank-portfolio-kafka
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: controller,broker
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: "bankportfolio-kafka-cluster"
      TZ: Asia/Seoul
    ports:
      - "9092:9092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

volumes:
  postgres_data:
  kafka_data:
  phoenix_data:
