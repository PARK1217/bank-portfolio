services:
  postgres:
    # pgvector 확장이 사전 빌드된 공식 이미지 (Debian bookworm + pg16).
    # 가이드 §3.7 RAG 의 벡터 유사도 검색은 pgvector `vector(768)` + `<=>` 코사인 거리에 의존.
    image: pgvector/pgvector:pg16
    container_name: bank-portfolio-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: bank
      POSTGRES_PASSWORD: bank1234
      POSTGRES_DB: bank
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
    ports:
      - "5434:5432"  # 기존 banking 스택(5433)과 동시 실행 가능하도록 분리
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/01_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./db/02_seed.sql:/docker-entrypoint-initdb.d/02_seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bank -d bank"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bank-portfolio-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://bank:bank1234@postgres:5432/bank
      JWT_SECRET: dev-secret-change-in-production-please-12345
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_MINUTES: 30
      CORS_ORIGINS: http://localhost:3001
      # LLM API (host `.env` 에서 보간, gitignore). 미설정 시 fallback 응답.
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
      HUGGINGFACE_API_KEY: ${HUGGINGFACE_API_KEY:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-groq}
    ports:
      - "8001:8000"  # 기존 banking 스택(8000)과 분리
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app  # 핫리로드용
      - ./data:/app/data:ro     # RAG 코퍼스 (FAQ·약관) read-only 마운트

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bank-portfolio-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8001
    ports:
      - "3001:3000"  # 기존 banking 스택(3000)과 분리
    depends_on:
      - backend

  kafka:
    # 공식 Apache Kafka 3.7 (KRaft 모드 — Zookeeper 없이 단독 운영, 가이드 §2.4).
    # ※ Bitnami 이미지(`bitnami/kafka:3.7`)는 정책 변경으로 무료 태그 제공 안 함 → 공식 이미지로 전환.
    # 토픽: transfer.settlement.{requested,completed} / chatbot.{llm.calls,rag.evaluations}
    image: apache/kafka:3.7.0
    container_name: bank-portfolio-kafka
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: controller,broker
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: "bankportfolio-kafka-cluster"
    ports:
      - "9092:9092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

volumes:
  postgres_data:
  kafka_data:
